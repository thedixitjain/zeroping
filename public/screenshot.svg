<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="100%" height="100%">
  <!-- Background -->
  <rect width="1200" height="800" fill="#0A0A0F" rx="16"/>
  
  <!-- Mac Window Controls -->
  <circle cx="24" cy="24" r="8" fill="#FF5F56" />
  <circle cx="48" cy="24" r="8" fill="#FFBD2E" />
  <circle cx="72" cy="24" r="8" fill="#27C93F" />

  <!-- Navbar -->
  <rect x="0" y="48" width="1200" height="60" fill="#111118" border-bottom="1px solid #1C1C28"/>
  <text x="32" y="86" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#FFFFFF">ZeroPing</text>
  <text x="140" y="84" font-family="'Courier New', monospace" font-size="12" fill="#00F0FF" opacity="0.8">v1.0.0</text>
  
  <rect x="1040" y="64" width="12" height="12" rx="6" fill="#00F0FF" />
  <text x="1064" y="74" font-family="sans-serif" font-size="12" fill="#888">Ollama connected</text>

  <!-- Left Sidebar (Controls) -->
  <rect x="32" y="140" width="280" height="600" rx="12" fill="#111118" stroke="#2A2A3A" stroke-width="2"/>
  <text x="56" y="180" font-family="sans-serif" font-size="18" font-weight="bold" fill="#FFF">Code Review</text>
  <text x="56" y="200" font-family="monospace" font-size="12" fill="#555">Powered by Local LLM</text>

  <!-- Model Dropdown Mock -->
  <rect x="56" y="240" width="232" height="40" rx="8" fill="#16161F" stroke="#2A2A3A" stroke-width="1"/>
  <circle cx="76" cy="260" r="4" fill="#00F0FF" />
  <text x="96" y="265" font-family="monospace" font-size="14" fill="#FFF">qwen2.5-coder:7b</text>
  
  <!-- Mode Toggle Mock -->
  <rect x="56" y="300" width="232" height="40" rx="8" fill="#16161F" stroke="#2A2A3A" stroke-width="1"/>
  <text x="76" y="325" font-family="sans-serif" font-size="14" fill="#FFF">Suggest Mode</text>
  <rect x="220" y="310" width="40" height="20" rx="10" fill="#00F0FF" opacity="0.2"/>
  <circle cx="240" cy="320" r="6" fill="#00F0FF" />

  <!-- "RUN SYSTEM REVIEW" Button -->
  <rect x="56" y="670" width="232" height="44" rx="10" fill="#00F0FF" />
  <text x="172" y="698" font-family="sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="middle">RUN SYSTEM REVIEW</text>


  <!-- Right Area (Code Editor Mock) -->
  <rect x="344" y="140" width="820" height="600" rx="12" fill="#111118" stroke="#2A2A3A" stroke-width="2"/>
  
  <!-- Code Lines Mockup -->
  <!-- Line Numbers -->
  <g font-family="monospace" font-size="14" fill="#444">
    <text x="364" y="180">1</text>
    <text x="364" y="210">2</text>
    <text x="364" y="240">3</text>
    <text x="364" y="270">4</text>
    <text x="364" y="300">5</text>
    <text x="364" y="330">6</text>
    <text x="364" y="360">7</text>
    <text x="364" y="390">8</text>
  </g>

  <!-- Syntax Highlights -->
  <g font-family="monospace" font-size="15">
    <text x="400" y="180" fill="#E06C75">import</text>
    <text x="466" y="180" fill="#ABB2BF">hashlib</text>

    <text x="400" y="240" fill="#C678DD">def</text>
    <text x="436" y="240" fill="#61AFEF">hash_password</text>
    <text x="550" y="240" fill="#ABB2BF">(password: str):</text>

    <text x="424" y="270" fill="#5C6370"># Legacy hashing method, might be flagged</text>
    
    <text x="424" y="300" fill="#ABB2BF">return hashlib.md5(password.encode()).hexdigest()</text>
  </g>

  <!-- AI Suggestion Popover (Hover effect mock) -->
  <rect x="500" y="320" width="450" height="150" rx="8" fill="#16161F" stroke="#00F0FF" stroke-width="2" />
  <rect x="510" y="330" width="80" height="24" rx="4" fill="#FF5F56" opacity="0.2"/>
  <text x="520" y="347" font-family="sans-serif" font-size="12" font-weight="bold" fill="#FF5F56">SECURITY</text>
  <text x="600" y="347" font-family="sans-serif" font-size="14" fill="#FFF" font-weight="bold">Insecure Hashing Algorithm</text>
  <text x="520" y="380" font-family="sans-serif" font-size="13" fill="#AAA">MD5 is cryptographically broken and vulnerable to collision</text>
  <text x="520" y="400" font-family="sans-serif" font-size="13" fill="#AAA">attacks. Do not use it for hashing passwords.</text>
  
  <text x="520" y="440" font-family="monospace" font-size="12" fill="#00F0FF">Recommendation: Use bcrypt or Argon2.</text>
</svg>
